<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}診断ジェネレーター{% endblock %} | 診断メーカー</title>
    <!-- Google Fonts: Inter & Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="{{ url_for('index') }}" class="logo">
                <i class="fa-solid fa-wand-magic-sparkles logo-icon"></i>
                <span class="logo-text">Shindan<span class="logo-highlight">Maker</span></span>
            </a>
            <nav class="nav">
                <a href="{{ url_for('index') }}" class="nav-link"><i class="fa-solid fa-house"></i> ホーム</a>
                <a href="{{ url_for('create_shindan') }}" class="btn btn-primary btn-sm nav-btn"><i class="fa-solid fa-plus"></i> 診断を作る</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash-message flash-{{ category }} fade-in">
                                <span class="flash-text">{{ message }}</span>
                                <button class="flash-close-btn" onclick="this.parentElement.remove();">&times;</button>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p class="footer-text">&copy; 2026 ShindanMaker. All rights reserved.</p>
            <div class="footer-links">
                <a href="{{ url_for('index') }}" class="footer-link">ホーム</a>
                <a href="{{ url_for('create_shindan') }}" class="footer-link">診断を作る</a>
            </div>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
